name: flutter_app
description: AI Assistant — cross-platform medical AI for doctors
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  flutter_markdown: ^0.7.3
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  file_picker: ^8.0.0
  pdf: ^3.11.2
  printing: ^5.13.1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  path_provider: ^2.1.4
  url_launcher: ^6.3.0
  geolocator: ^13.0.1
  intl: ^0.20.1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 24
